version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: ems-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: ems-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ems
      JWT_SECRET: change_this_super_secret_key
      JWT_EXPIRES_IN: 1d
      COOKIE_EXPIRES_DAYS: 1
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: ems-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
